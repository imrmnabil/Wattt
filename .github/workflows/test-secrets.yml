name: Test Secrets

on:
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Check all secrets are readable
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          status=0

          check() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "::error::Secret $name is MISSING or empty"
              status=1
            else
              echo "✅ Secret $name is set (length: ${#value})"
            fi
          }

          check "KEYSTORE_BASE64" "$KEYSTORE_BASE64"
          check "STORE_PASSWORD"  "$STORE_PASSWORD"
          check "KEY_ALIAS"       "$KEY_ALIAS"
          check "KEY_PASSWORD"    "$KEY_PASSWORD"

          if [ "$status" -ne 0 ]; then
            echo "::error::One or more secrets are missing"
            exit 1
          fi

          echo "All secrets are readable."

      - name: Verify keystore decodes correctly
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          if [ -s keystore.jks ]; then
            echo "✅ Keystore decoded successfully (size: $(stat -c%s keystore.jks) bytes)"
          else
            echo "::error::Decoded keystore is empty"
            exit 1
          fi
